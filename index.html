<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="./lib/tiny-brutalism.css">
<style>
* { touch-action: none; }
body { margin: 0; overflow: hidden; background: #a9b0ba; }
#menu { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; background: #a9b0ba; z-index: 100; }
#menu.hidden { display: none; }
h1 { font-size: 2rem; text-transform: uppercase; letter-spacing: 0.1em; }
.btn { font-size: 1.2rem; padding: 0.5rem 1rem; }
</style>
</head>
<body>
<div id="menu">
<h1>Gas Game</h1>
<button class="btn" onclick="startGame('level one')">Level One</button>
<button class="btn" onclick="startGame('level two')">Level Two</button>
</div>
<script>
function startGame(levelName) {
    document.getElementById('menu').classList.add('hidden');
    loadLevel(levelName);
}
</script>
<script src="./lib/littlejs.js"></script>
<script src="./src/tileData.js"></script>
<script src="./src/gameData.js"></script>
<script src="./src/objects.js"></script>
<script src="./src/levels.js"></script>
<script src="./src/game.js"></script>
</body>
</html>
