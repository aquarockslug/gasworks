<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="./lib/tiny-brutalism.css">
<link rel="stylesheet" href="./src/style.css">
</head>
<body>
<div id="menu">
<h1>Gasworks</h1>
<div id="level-buttons"></div>
</div>
<button id="menu-btn" class="btn hidden" onclick="showMenu()">Menu</button>
<script src="./lib/littlejs.js"></script>
<script src="./src/tileData.js"></script>
<script src="./src/gameData.js"></script>
<script src="./src/objects.js"></script>
<script src="./src/levels.js"></script>
<script src="./src/game.js"></script>
<script>
function startGame(levelIndex) {
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('menu-btn').classList.remove('hidden');
    loadLevel(levels[levelIndex].name);
}

function showMenu() {
    document.getElementById('menu').classList.remove('hidden');
    document.getElementById('menu-btn').classList.add('hidden');
}

(function generateLevelButtons() {
    const container = document.getElementById('level-buttons');
    levels.forEach((level, index) => {
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.innerHTML = `${index + 1}<br>${level.name}`;
        btn.onclick = () => startGame(index);
        container.appendChild(btn);
    });
})();
</script>
</body>
</html>
